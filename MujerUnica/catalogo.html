<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Completo - Mujer Unica</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">✨</span><span class="logo-text">MujerUnica</span>
            </a>
            <ul class="nav-links" id="dynamic-nav">
                <!-- Javascript inyectará los enlaces aquí dependiendo del estado de la sesión -->
            </ul>
            <div class="nav-actions">
                <a href="carrito.html" class="icon-btn cart-btn" style="text-decoration:none;">
                    🛒 <span class="badge" id="cart-count">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="page-container">
        <h2 class="page-title">Catálogo de Productos</h2>
        <p style="text-align: center; color: var(--text-light); margin-bottom: 3rem;">
            Explora toda nuestra colección. Añade a tu carrito lo que más te guste.
        </p>

        <!-- Contenedor donde Javascript inyectará TODO el catálogo -->
        <div class="products-grid" id="products-container">
            <p class="loading">Cargando catálogo completo...</p>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Mujer Unica. Todos los derechos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
