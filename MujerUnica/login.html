<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Mujer Unica</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">✨</span><span class="logo-text">MujerUnica</span>
            </a>
            <ul class="nav-links" id="dynamic-nav">
                <!-- Javascript inyectará los enlaces aquí dependiendo del estado de la sesión -->
            </ul>
            <div class="nav-actions">
                <a href="carrito.html" class="icon-btn cart-btn" style="text-decoration:none;">
                    🛒 <span class="badge" id="cart-count">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="page-container">
        <div class="auth-container">
            <h2 class="page-title" style="margin-bottom: 1.5rem;">Iniciar Sesión</h2>
            <form onsubmit="handleLoginSubmit(event)">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="********" required>
                </div>
                <button type="submit" class="cta-btn" style="width: 100%;">Entrar</button>
            </form>
            <div class="auth-links">
                <p>¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Mujer Unica. Todos los derechos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
