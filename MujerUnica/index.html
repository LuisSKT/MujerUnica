<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mujer Unica - Inicio</title>
    <link rel="stylesheet" href="htmls/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">✨</span><span class="logo-text">MujerUnica</span>
            </a>
            <ul class="nav-links" id="dynamic-nav">
                <!-- Javascript inyectará los enlaces aquí dependiendo del estado de la sesión -->
            </ul>
            <div class="nav-actions">
                <a href="htmls/carrito.html" class="icon-btn cart-btn" style="text-decoration:none;">
                    🛒 <span class="badge" id="cart-count">0</span>
                </a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <span class="subtitle">NUEVA COLECCIÓN</span>
            <h1>Define tu <span>Estilo</span> Hoy</h1>
            <p>Descubre las prendas más exclusivas y modernas, diseñadas para destacar en cualquier ocasión.</p>
            <a href="htmls/catalogo.html" class="cta-btn">Ir al Catálogo Completo</a>
        </div>
    </header>

    <main class="page-container">
        <h2 class="page-title">Tendencias Destacadas</h2>
        <!-- Contenedor donde Javascript inyectará los productos de inicio -->
        <div class="products-grid" id="products-container">
            <p class="loading">Cargando productos destacados...</p>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Mujer Unica. Todos los derechos reservados.</p>
    </footer>

    <script src="htmls/script.js"></script>
</body>

</html>
