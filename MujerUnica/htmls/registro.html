<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mujer Unica</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">✨</span><span class="logo-text">MujerUnica</span>
            </a>
            <ul class="nav-links" id="dynamic-nav">
                <!-- Javascript inyectará los enlaces aquí dependiendo del estado de la sesión -->
            </ul>
            <div class="nav-actions">
                <a href="carrito.html" class="icon-btn cart-btn" style="text-decoration:none;">
                    🛒 <span class="badge" id="cart-count">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="page-container">
        <div class="auth-container">
            <h2 class="page-title" style="margin-bottom: 1.5rem;">Crea tu Cuenta</h2>
            <form onsubmit="handleRegisterSubmit(event)">
                <div class="form-group">
                    <label for="fullname">Nombre Completo</label>
                    <input type="text" id="fullname" class="form-control" placeholder="Juan Pérez" required>
                </div>
                
                <div class="form-group">
                    <label for="email-reg">Correo Electrónico</label>
                    <input type="email" id="email-reg" class="form-control" placeholder="tu@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="password-reg">Contraseña</label>
                    <input type="password" id="password-reg" class="form-control" placeholder="Crea una contraseña segura" required>
                </div>

                <!-- Campos Adicionales Pedidos por el Usuario -->
                <div class="form-group">
                    <label for="talla">Talla Preferida</label>
                    <select id="talla" class="form-control" required style="background:white; cursor:pointer;">
                        <option value="">Selecciona tu talla</option>
                        <option value="S">S - Pequeña</option>
                        <option value="M">M - Mediana</option>
                        <option value="L">L - Grande</option>
                        <option value="XL">XL - Extra Grande</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="ocupacion">Ocupación / Profesión</label>
                    <input type="text" id="ocupacion" class="form-control" placeholder="Ej: Estudiante, Ingeniero..." required>
                </div>

                <button type="submit" class="cta-btn" style="width: 100%;">Registrarme</button>
            </form>
            <div class="auth-links">
                <p>¿Ya tienes cuenta? <a href="login.html">Inicia Sesión</a></p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Mujer Unica. Todos los derechos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
